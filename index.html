<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>言叶之庭 - 精致日和版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        :root {
            --bg: #f7f6f2; 
            --card: #ffffff;
            --text: #2c3e50;
            --sub: #95a5a6;
            --border: #eceae2;
            /* 严格定义的日式传统色 */
            --color-red: #d15147;    /* 洗朱 (Araigushu) - 典雅朱红 */
            --color-green: #6b8e6b;  /* 若竹色 (Wakatake) - 沉稳青绿 */
            --shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: "PingFang SC", "Hiragino Sans GB", sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* --- 侧边错题本 --- */
        #wrong-sidebar { 
            position: fixed; left: 0; top: 0; width: 260px; height: 100%;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-right: 1px solid var(--border); z-index: 1000;
            transform: translateX(-100%); padding: 30px; display: flex; flex-direction: column;
        }
        #wrong-sidebar.active { transform: translateX(0); box-shadow: 5px 0 20px rgba(0,0,0,0.02); }

        /* --- 主卡片：自适应居中 --- */
        .main-card { 
            width: 90%; 
            max-width: 460px; /* 恢复精致尺寸 */
            background: var(--card); border-radius: 24px;
            box-shadow: var(--shadow); overflow: hidden;
            display: flex; flex-direction: column; 
            position: relative; z-index: 10;
        }

        /* 顶部导航 */
        .nav { padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--sub); letter-spacing: 1px; }
        .nav span { cursor: pointer; }

        /* 题目区 */
        .quiz-box { padding: 35px 20px; text-align: center; }
        #q-text { font-size: 1.6rem; font-weight: 600; min-height: 2.2rem; }

        /* 书写区 */
        .canvas-area { position: relative; width: 100%; height: 320px; background: #fff; border-bottom: 1px solid var(--border); }
        .grid-bg { position: absolute; inset: 0; opacity: 0.05; background-image: linear-gradient(var(--text) 1px, transparent 1px), linear-gradient(90deg, var(--text) 1px, transparent 1px); background-size: 50% 50%; background-position: center; }
        #board { position: relative; z-index: 5; }

        /* --- 灵动判定卡 (右侧弹出) --- */
        #ans-pop { 
            position: fixed; 
            /* 宽屏时相对于主卡片右侧，手机端居中 */
            right: calc(50% - 480px); 
            top: 50%; transform: translateY(-50%) scale(0.8);
            width: 220px; background: var(--card); padding: 25px; border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1); text-align: center; 
            opacity: 0; pointer-events: none; z-index: 100;
        }
        #ans-pop.active { opacity: 1; pointer-events: auto; transform: translateY(-50%) scale(1); right: calc(50% - 500px); }

        /* 答案文字缩放 */
        #ans-text { 
            font-size: 2.8rem; font-family: "KaiTi", serif; color: var(--text); 
            display: block; margin-bottom: 20px; word-break: break-all; line-height: 1.2;
        }
        #ans-text.long { font-size: 1.8rem; }
        #ans-text.extra-long { font-size: 1.4rem; }

        /* 判定按钮：日式传统色 */
        .judge-btn { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 12px; border: none; font-size: 13px; cursor: pointer; color: white; font-weight: bold; }
        .btn-yes { background: var(--color-green); }
        .btn-no { background: var(--color-red); }

        /* 底部按钮 */
        .footer { display: grid; grid-template-columns: 1fr 1.5fr 1fr; background: var(--border); gap: 1px; }
        .footer button { padding: 20px; border: none; background: #fff; font-size: 14px; cursor: pointer; color: var(--text); }
        .btn-main { background: var(--text) !important; color: #fff !important; }

        /* 设置页 */
        #settings { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; padding: 30px; overflow-y: auto; }
        .set-box { background: #fff; border-radius: 20px; padding: 25px; max-width: 400px; margin: 0 auto; box-shadow: var(--shadow); }
        select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; outline: none; }

        /* 手机适配 */
        @media (max-width: 1000px) {
            #ans-pop { right: 50% !important; transform: translate(50%, -50%) scale(0.8) !important; width: 80%; }
            #ans-pop.active { transform: translate(50%, -50%) scale(1) !important; }
        }
    </style>
</head>
<body>

<div id="wrong-sidebar">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h4 style="margin:0">错题本</h4>
        <span onclick="toggleSidebar()" style="cursor:pointer">×</span>
    </div>
    <div id="wrong-list" style="flex:1; overflow-y:auto; font-size:13px;"></div>
    <button onclick="clearWrongs()" style="width:100%; padding:10px; border:none; background:#eee; border-radius:8px; margin-top:10px;">清空</button>
</div>

<div class="main-card">
    <div class="nav">
        <span onclick="toggleSidebar()">📓 记录</span>
        <span id="count-info">0 ITEMS</span>
        <span onclick="toggleSettings(true)">⚙️ 设置</span>
    </div>
    <div class="quiz-box">
        <div id="q-cat" style="font-size:10px; color:var(--color-red); letter-spacing:1px; margin-bottom:8px; font-weight:bold;">LOAD</div>
        <div id="q-text">载入中...</div>
    </div>
    <div class="canvas-area">
        <div class="grid-bg"></div>
        <canvas id="board"></canvas>
    </div>
    <div class="footer">
        <button onclick="clearBoard()" style="color:var(--sub);">重写</button>
        <button class="btn-main" onclick="showAns(true)">检查答案</button>
        <button onclick="nextQ()">跳过</button>
    </div>
</div>

<div id="ans-pop">
    <span style="font-size:11px; color:var(--sub); display:block; margin-bottom:12px;">核对</span>
    <div id="ans-text">--</div>
    <button class="judge-btn btn-yes" onclick="mark(true)">正确 ☑️ です</button>
    <button class="judge-btn btn-no" onclick="mark(false)">不正确 🔘</button>
</div>

<div id="settings">
    <div style="max-width:400px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="margin:0">设置</h3>
        <button onclick="toggleSettings(false)" style="border:none; background:none; font-size:20px;">×</button>
    </div>
    <div class="set-box">
        <label style="font-size:12px; font-weight:bold;">出题规则</label>
        <select id="mode" onchange="applyRule()">
            <option value="all">随机全部</option>
            <option value="wrong">仅错题</option>
            <option value="word">仅字词</option>
            <option value="poem">仅古诗</option>
        </select>
        <label style="font-size:12px; font-weight:bold;">数据 JSON</label>
        <textarea id="jsonInput" rows="4"></textarea>
        <button onclick="upload('cover')" style="width:100%; padding:12px; background:var(--text); color:white; border:none; border-radius:10px; margin-bottom:10px;">覆盖导入</button>
        <button onclick="delCloud()" style="width:100%; color:var(--color-red); background:none; border:none; font-size:11px;">⚠️ 清空云端</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ltnlmgtoqecvctyeetma.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0bmxtZ3RvcWVjdmN0eWVldG1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjM4MTAsImV4cCI6MjA4OTYzOTgxMH0.OB5An1HAkEiASsE_cV1KoFCWBcyYQGUPa6BKsM6LwaI';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let all = [], filtered = [], wrongs = JSON.parse(localStorage.getItem('wrongs_v4') || '[]'), current = null;

    window.onload = () => { initCanvas(); sync(); renderWrongs(); };

    async function sync() {
        const { data } = await supabase.from('dictation_items').select('*');
        all = data || [];
        applyRule();
    }

    function applyRule() {
        const m = document.getElementById('mode').value;
        if(m==='all') filtered = all;
        else if(m==='wrong') filtered = wrongs;
        else if(m==='word') filtered = all.filter(i => (i.cat||'').match(/字|词/));
        else if(m==='poem') filtered = all.filter(i => (i.cat||'').match(/诗/));
        document.getElementById('count-info').innerText = `${filtered.length} ITEMS`;
        nextQ();
    }

    function mark(isOk) {
        if(!isOk && !wrongs.find(i => i.q === current.q)) {
            wrongs.push(current);
            localStorage.setItem('wrongs_v4', JSON.stringify(wrongs));
            renderWrongs();
        }
        showAns(false);
        setTimeout(nextQ, 400);
    }

    function renderWrongs() {
        document.getElementById('wrong-list').innerHTML = wrongs.map(i => `<div style="padding:8px 0; border-bottom:1px solid #eee"><b>${i.a}</b> <span style="color:#bdc3c7">${i.q}</span></div>`).join('');
    }

    function nextQ() {
        if(!filtered.length) { document.getElementById('q-text').innerText = "无内容"; return; }
        clearBoard();
        current = filtered[Math.floor(Math.random() * filtered.length)];
        document.getElementById('q-cat').innerText = (current.cat || '言叶').toUpperCase();
        document.getElementById('q-text').innerText = current.q;
        
        const ansEl = document.getElementById('ans-text');
        const txt = current.a || '';
        ansEl.innerText = txt;
        ansEl.className = '';
        if(txt.length > 3 && txt.length <= 6) ansEl.classList.add('long');
        else if(txt.length > 6) ansEl.classList.add('extra-long');
    }

    function showAns(s) { document.getElementById('ans-pop').classList.toggle('active', s); }
    function toggleSidebar() { document.getElementById('wrong-sidebar').classList.toggle('active'); }
    function toggleSettings(s) { document.getElementById('settings').style.display = s ? 'block' : 'none'; }
    function clearWrongs() { if(confirm("清空本地？")) { wrongs=[]; localStorage.setItem('wrongs_v4','[]'); renderWrongs(); applyRule(); } }

    async function upload(m) {
        try {
            const j = JSON.parse(document.getElementById('jsonInput').value);
            if(m==='cover') await supabase.from('dictation_items').delete().neq('cat','_');
            await supabase.from('dictation_items').insert(j);
            location.reload();
        } catch(e) { alert("格式错误"); }
    }

    async function delCloud() { if(confirm("彻底清空？")) { await supabase.from('dictation_items').delete().neq('cat','_'); location.reload(); } }

    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    function initCanvas() {
        const rect = canvas.parentNode.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#2c3e50';
    }
    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: cx - rect.left, y: cy - rect.top };
    };
    canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', (e) => { if (drawing) { const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } });
    window.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (drawing) { const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } });
    function clearBoard() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    window.onresize = initCanvas;
</script>
</body>
</html>
