<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>言叶之庭 - 专业听写版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        :root {
            --bg: #f6f5f1; --card: #ffffff; --text: #2c3e50; 
            --sub: #7f8c8d; --accent: #d35400; --border: #e0e0e0;
            --green: #27ae60; --red: #e74c3c;
        }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        
        /* 布局控制 */
        .main-layout { display: flex; height: 100vh; width: 100vw; transition: 0.3s; }
        
        /* 左侧错题列 */
        #wrong-sidebar { width: 250px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; transform: translateX(-250px); transition: 0.3s; position: absolute; height: 100%; z-index: 100; }
        #wrong-sidebar.active { transform: translateX(0); position: relative; }
        .sidebar-header { padding: 15px; background: #fafafa; font-weight: bold; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .wrong-list { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        .wrong-item { padding: 8px; border-bottom: 1px solid #eee; }

        /* 主容器 */
        .app-container { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; }
        .content-card { width: 100%; max-width: 500px; background: var(--card); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; }
        
        /* 顶部导航 */
        .nav-bar { padding: 12px 20px; background: #fafafa; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .icon-btn { cursor: pointer; font-size: 18px; padding: 5px; }

        /* 题目区 */
        .quiz-section { padding: 30px 20px; text-align: center; border-bottom: 1px solid #f9f9f9; }
        #q-cat { font-size: 11px; color: var(--accent); font-weight: bold; margin-bottom: 5px; }
        #q-text { font-size: 1.5rem; font-weight: 600; min-height: 2rem; }

        /* 手写板 */
        .canvas-wrap { position: relative; width: 100%; height: 300px; background: #fff; touch-action: none; }
        #board { width: 100%; height: 100%; cursor: crosshair; position: relative; z-index: 2; }
        .tianzige { position: absolute; inset: 0; z-index: 1; opacity: 0.05; background-image: linear-gradient(var(--text) 1px, transparent 1px), linear-gradient(90deg, var(--text) 1px, transparent 1px); background-size: 50% 50%; background-position: center; border: 1px solid var(--text); }

        /* 答案及判定区 */
        #ans-area { display: none; padding: 20px; text-align: center; background: #fbfcfc; border-top: 1px solid #f0f0f0; }
        #ans-text { font-size: 2.4rem; font-family: "KaiTi", serif; color: var(--accent); font-weight: bold; margin-bottom: 15px; }
        .judge-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-j { padding: 10px; border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: bold; }

        /* 底部主按钮 */
        .main-btns { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 1px; background: var(--border); }
        .main-btns button { border: none; padding: 18px; background: #fff; cursor: pointer; font-weight: 500; }
        .btn-primary { background: var(--accent) !important; color: white !important; }

        /* 设置页面（全屏覆盖） */
        #settings-page { display: none; position: fixed; inset: 0; background: #fff; z-index: 200; padding: 20px; overflow-y: auto; }
        .setting-item { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .setting-item label { display: block; font-weight: bold; margin-bottom: 10px; }
        select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

<div class="main-layout">
    <div id="wrong-sidebar">
        <div class="sidebar-header">
            <span>错题本 (Local)</span>
            <span style="cursor:pointer" onclick="clearWrongs()">🗑️</span>
        </div>
        <div id="wrong-list" class="wrong-list"></div>
        <button onclick="toggleSidebar()" style="padding:10px; border:none; background:var(--text); color:white;">关闭</button>
    </div>

    <div class="app-container">
        <div class="content-card">
            <div class="nav-bar">
                <span class="icon-btn" onclick="toggleSidebar()">☰</span>
                <span id="count-info">加载中...</span>
                <span class="icon-btn" onclick="toggleSettings(true)">⚙️</span>
            </div>
            
            <div class="quiz-section">
                <div id="q-cat">---</div>
                <div id="q-text">数据加载中...</div>
            </div>

            <div class="canvas-wrap">
                <div class="tianzige"></div>
                <canvas id="board"></canvas>
            </div>

            <div id="ans-area">
                <div id="ans-text">--</div>
                <div class="judge-btns">
                    <button class="btn-j" style="background:var(--red)" onclick="markResult(false)">不正确！🔘</button>
                    <button class="btn-j" style="background:var(--green)" onclick="markResult(true)">正确☑️です</button>
                </div>
            </div>

            <div class="main-btns">
                <button onclick="clearBoard()">重写</button>
                <button class="btn-primary" onclick="showAns()">看答案</button>
                <button onclick="nextQ()">下一题</button>
            </div>
        </div>
    </div>
</div>

<div id="settings-page">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h2>⚙️ 设置与管理</h2>
        <button onclick="toggleSettings(false)" style="padding:10px 20px; border-radius:20px; border:1px solid #ddd;">返回主页</button>
    </div>

    <div class="setting-item">
        <label>🎯 答题模式选择</label>
        <select id="rule-select" onchange="applyRule()">
            <option value="all">全部题目 (随机)</option>
            <option value="wrong">只练习错题</option>
            <option value="word">只练习字词 (分类包含"字"或"词")</option>
            <option value="poem">只练习古诗 (分类包含"诗")</option>
        </select>
    </div>

    <div class="setting-item">
        <label>📦 数据库管理 (JSON 导入)</label>
        <textarea id="jsonInput" placeholder="在此粘贴 JSON 数组代码..."></textarea>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
            <button onclick="uploadData('cover')" style="background:#2c3e50; color:white; padding:12px; border:none; border-radius:8px;">全量覆盖</button>
            <button onclick="uploadData('merge')" style="background:#34495e; color:white; padding:12px; border:none; border-radius:8px;">增量合并</button>
        </div>
        <button onclick="deleteAllData()" style="width:100%; background:var(--red); color:white; padding:10px; border:none; border-radius:8px; margin-top:10px;">清空云端所有题库</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ltnlmgtoqecvctyeetma.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0bmxtZ3RvcWVjdmN0eWVldG1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjM4MTAsImV4cCI6MjA4OTYzOTgxMH0.OB5An1HAkEiASsE_cV1KoFCWBcyYQGUPa6BKsM6LwaI';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allQuestions = []; // 云端原始数据
    let filteredQuestions = []; // 过滤后的当前题库
    let wrongQuestions = JSON.parse(localStorage.getItem('wrong_db') || '[]');
    let currentItem = null;

    // --- 初始化 ---
    window.onload = () => { initCanvas(); sync(); renderWrongList(); };

    async function sync() {
        const { data, error } = await supabase.from('dictation_items').select('*');
        if (!error) {
            allQuestions = data || [];
            applyRule(); // 同步后立即应用过滤规则
        }
    }

    // --- 答题规则过滤 ---
    function applyRule() {
        const rule = document.getElementById('rule-select').value;
        if (rule === 'all') {
            filteredQuestions = allQuestions;
        } else if (rule === 'wrong') {
            filteredQuestions = wrongQuestions;
        } else if (rule === 'word') {
            filteredQuestions = allQuestions.filter(i => i.cat.includes('字') || i.cat.includes('词'));
        } else if (rule === 'poem') {
            filteredQuestions = allQuestions.filter(i => i.cat.includes('诗'));
        }
        
        document.getElementById('count-info').innerText = `${filteredQuestions.length} 题`;
        if (filteredQuestions.length > 0) nextQ();
        else document.getElementById('q-text').innerText = "该模式下没有题目";
    }

    // --- 错题判定逻辑 ---
    function markResult(isCorrect) {
        if (!isCorrect) {
            // 如果不在错题本里，则加入
            if (!wrongQuestions.find(i => i.q === currentItem.q)) {
                wrongQuestions.push(currentItem);
                localStorage.setItem('wrong_db', JSON.stringify(wrongQuestions));
                renderWrongList();
            }
        }
        nextQ();
    }

    function renderWrongList() {
        const list = document.getElementById('wrong-list');
        list.innerHTML = wrongQuestions.map(i => `<div class="wrong-item"><b>${i.a}</b> <small>(${i.q})</small></div>`).join('');
    }

    function clearWrongs() {
        if(confirm("确定清空错题本？")) {
            wrongQuestions = [];
            localStorage.setItem('wrong_db', '[]');
            renderWrongList();
            applyRule();
        }
    }

    // --- 基础练习逻辑 ---
    function nextQ() {
        if (filteredQuestions.length === 0) return;
        document.getElementById('ans-area').style.display = 'none';
        clearBoard();
        currentItem = filteredQuestions[Math.floor(Math.random() * filteredQuestions.length)];
        document.getElementById('q-cat').innerText = currentItem.cat;
        document.getElementById('q-text').innerText = currentItem.q;
        document.getElementById('ans-text').innerText = currentItem.a;
    }

    function showAns() { document.getElementById('ans-area').style.display = 'block'; }

    // --- UI 控制 ---
    function toggleSidebar() { document.getElementById('wrong-sidebar').classList.toggle('active'); }
    function toggleSettings(show) { document.getElementById('settings-page').style.display = show ? 'block' : 'none'; }

    // --- 数据库操作 (存放在设置页) ---
    async function uploadData(mode) {
        const val = document.getElementById('jsonInput').value;
        if(!val) return alert("空");
        try {
            const json = JSON.parse(val);
            if (mode === 'cover') await supabase.from('dictation_items').delete().neq('id', '000...00');
            await supabase.from('dictation_items').insert(json);
            alert("上传成功");
            sync();
        } catch (e) { alert(e.message); }
    }

    async function deleteAllData() {
        if(confirm("确定全删？")) {
            await supabase.from('dictation_items').delete().neq('id', '000...00');
            sync();
        }
    }

    // --- 画布逻辑 (已适配缩放) ---
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    function initCanvas() {
        const rect = canvas.parentNode.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#2c3e50';
    }
    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: cx - rect.left, y: cy - rect.top };
    };
    canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', (e) => { if (drawing) { const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } });
    window.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (drawing) { const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } });
    function clearBoard() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    window.onresize = initCanvas;
</script>
</body>
</html>
