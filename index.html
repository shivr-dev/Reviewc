<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>云同步听写助手 - 终极修复版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        :root { --bg: #f0f2f5; --primary: #3ecf8e; --dark: #1c1c1c; }
        body { font-family: system-ui; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { padding: 15px 20px; background: var(--dark); color: #fff; display: flex; justify-content: space-between; font-size: 13px; }
        .quiz-box { padding: 40px 20px; text-align: center; }
        #q-text { font-size: 1.8rem; font-weight: bold; margin-top: 10px; min-height: 2.5rem; }
        .canvas-wrap { position: relative; width: 100%; height: 320px; background: #fff; touch-action: none; border-top: 1px solid #eee; }
        #board { width: 100%; height: 100%; cursor: crosshair; position: relative; z-index: 2; }
        .mizige { position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: 0.1; background-image: linear-gradient(#4a6cf7 1px, transparent 1px), linear-gradient(90deg, #4a6cf7 1px, transparent 1px); background-size: 50% 50%; }
        #ans-box { display: none; padding: 20px; text-align: center; background: #f6fffa; border-top: 2px solid var(--primary); }
        #ans-text { font-size: 2.5rem; font-family: "KaiTi", "楷体", serif; color: #2c3e50; font-weight: bold; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; background: #ddd; gap: 1px; }
        button { border: none; padding: 20px; font-size: 1rem; cursor: pointer; background: #fff; font-weight: bold; }
        .btn-show { background: var(--primary); color: white; }
        /* 强制警告框样式 */
        #fatal-error { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); color:red; z-index:9999; padding:50px; box-sizing:border-box; font-family:monospace; }
    </style>
</head>
<body>

<div id="fatal-error">
    <h1>⚠️ 系统自检失败</h1>
    <p id="error-msg">代码运行被中断或库未加载</p>
    <button onclick="location.reload()" style="padding:10px; background:white; border:none;">尝试刷新页面</button>
</div>

<div class="container">
    <div class="header">
        <span id="sync-status">📡 初始化中...</span>
        <span id="count-info">0 题</span>
    </div>
    <div class="quiz-box">
        <div id="q-cat" style="color:var(--primary)">BOOTING...</div>
        <div id="q-text">正在检查数据库状态...</div>
    </div>
    <div class="canvas-wrap">
        <div class="mizige"></div>
        <canvas id="board"></canvas>
    </div>
    <div id="ans-box">
        <div id="ans-text">--</div>
    </div>
    <div class="btn-group">
        <button onclick="clearBoard()">重写</button>
        <button class="btn-show" onclick="showAns()">看答案</button>
        <button onclick="nextQ()">下一题</button>
    </div>
</div>

<div style="width:100%; max-width:600px; margin-top:20px;">
    <details style="background:#fff; border-radius:10px; padding:10px; border:1px solid #ddd;">
        <summary>⚙️ 导入 JSON 数据</summary>
        <textarea id="jsonInput" style="width:100%; height:80px; margin:10px 0;" placeholder='粘贴 JSON...'></textarea>
        <button onclick="uploadToCloud()" style="width:100%; padding:10px; background:#1c1c1c; color:white; border:none; border-radius:5px;">存入云端</button>
    </details>
</div>

<script>
    const SUPABASE_URL = 'https://ltnlmgtoqecvctyeetma.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0bmxtZ3RvcWVjdmN0eWVldG1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjM4MTAsImV4cCI6MjA4OTYzOTgxMH0.OB5An1HAkEiASsE_cV1KoFCWBcyYQGUPa6BKsM6LwaI';

    let supabase;
    let questions = [];

    // --- 强制自检逻辑 ---
    async function startApp() {
        const statusEl = document.getElementById('sync-status');
        const qTextEl = document.getElementById('q-text');

        // 检测 SDK
        if (typeof window.supabase === 'undefined') {
            showFatalError("Supabase SDK 加载失败！请检查你的网络是否能访问 cdn.jsdelivr.net。");
            return;
        }

        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            statusEl.innerText = "⏳ 正在尝试读取表...";
            
            // 尝试读取数据
            const { data, error } = await supabase.from('dictation_items').select('*');
            
            if (error) {
                statusEl.innerText = "❌ 数据库报错";
                qTextEl.innerText = "错误详情: " + error.message;
                return;
            }

            questions = data || [];
            statusEl.innerText = "✅ 同步完成";
            document.getElementById('count-info').innerText = `${questions.length} 题`;
            
            if (questions.length > 0) {
                nextQ();
            } else {
                qTextEl.innerText = "题库空空如也，请点下方展开导入";
                document.getElementById('q-cat').innerText = "EMPTY";
            }

        } catch (e) {
            showFatalError("连接过程中发生异常: " + e.message);
        }
    }

    function showFatalError(msg) {
        document.getElementById('fatal-error').style.display = 'block';
        document.getElementById('error-msg').innerText = msg;
    }

    // --- 画布及练习逻辑 (保持高度精简且兼容) ---
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function initCanvas() {
        const rect = canvas.parentNode.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#333';
    }

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: cx - rect.left, y: cy - rect.top };
    };

    canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', (e) => { if (drawing) { const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } });
    window.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (drawing) { const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } });

    function clearBoard() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    function showAns() { document.getElementById('ans-box').style.display = 'block'; }
    
    function nextQ() {
        if (questions.length === 0) return;
        document.getElementById('ans-box').style.display = 'none';
        clearBoard();
        const item = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('q-cat').innerText = item.cat || '无分类';
        document.getElementById('q-text').innerText = item.q || '无题目';
        document.getElementById('ans-text').innerText = item.a || '无答案';
    }

    async function uploadToCloud() {
        const val = document.getElementById('jsonInput').value;
        if(!val) return;
        try {
            const json = JSON.parse(val);
            document.getElementById('sync-status').innerText = "⏳ 上传中...";
            // 先清空
            await supabase.from('dictation_items').delete().neq('cat', '___');
            // 再插入
            const { error } = await supabase.from('dictation_items').insert(json);
            if (error) throw error;
            alert("上传成功！正在刷新...");
            location.reload();
        } catch (e) {
            alert("上传失败：" + e.message);
        }
    }

    // 启动！
    window.onload = () => {
        initCanvas();
        startApp();
    };
    window.onresize = initCanvas;
</script>
</body>
</html>
