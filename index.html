<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>言叶之庭 - 云同步听写</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        :root {
            --bg-color: #f6f5f1; --card-bg: #ffffff; --text-main: #2c3e50; 
            --text-sub: #7f8c8d; --accent: #d35400; --border: #e0e0e0;
            --grid-color: rgba(44, 62, 80, 0.06);
        }
        body { font-family: system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 600px; background-color: var(--card-bg); border-radius: 16px; shadow: 0 8px 30px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .header { padding: 12px 20px; background-color: #fafafa; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 12px; color: var(--text-sub); }
        .quiz-section { padding: 35px 20px; text-align: center; border-bottom: 1px solid #f9f9f9; }
        #q-cat { font-size: 12px; color: var(--accent); letter-spacing: 1px; margin-bottom: 8px; font-weight: bold; }
        #q-text { font-size: 1.7rem; font-weight: 600; min-height: 2.2rem; }
        .canvas-wrap { position: relative; width: 100%; height: 320px; background-color: #fff; touch-action: none; box-shadow: inset 0 2px 10px rgba(0,0,0,0.03); }
        #board { width: 100%; height: 100%; cursor: crosshair; position: relative; z-index: 2; }
        .tianzige { position: absolute; inset: 0; z-index: 1; pointer-events: none; background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px); background-size: 50% 50%; background-position: center; border: 1px solid var(--grid-color); }
        #ans-box { display: none; padding: 25px; text-align: center; background-color: #fbfcfc; border-top: 1px solid #f0f0f0; }
        #ans-text { font-size: 2.8rem; font-family: "KaiTi", serif; color: var(--accent); letter-spacing: 6px; font-weight: bold; }
        .btn-group { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 1px; background-color: var(--border); }
        button { border: none; padding: 20px; font-size: 15px; cursor: pointer; background-color: #fff; color: var(--text-main); font-weight: 500; }
        button:active { background-color: #f5f5f5; }
        .btn-show { background-color: var(--accent); color: white; }
        .admin-panel { width: 100%; max-width: 600px; margin-top: 25px; font-size: 13px; }
        details { background-color: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        summary { cursor: pointer; color: var(--text-sub); font-weight: bold; }
        textarea { width: 100%; height: 100px; margin: 15px 0; border: 1px solid var(--border); border-radius: 8px; padding: 12px; box-sizing: border-box; font-size: 12px; background-color: #fafafa; }
        .admin-btns { display: flex; gap: 10px; margin-top: 5px; }
        .admin-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; color: white; transition: 0.2s; }
        .btn-cover { background-color: #2c3e50; }
        .btn-merge { background-color: #34495e; opacity: 0.9; }
        .btn-delete { background-color: #c0392b; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <span id="sync-status">📡 初始化中...</span>
        <span id="count-info">0 题</span>
    </div>
    <div class="quiz-section">
        <div id="q-cat">YANYE</div>
        <div id="q-text">数据同步中...</div>
    </div>
    <div class="canvas-wrap">
        <div class="tianzige"></div>
        <canvas id="board"></canvas>
    </div>
    <div id="ans-box">
        <div id="ans-text">--</div>
    </div>
    <div class="btn-group">
        <button onclick="clearBoard()" style="color:var(--text-sub);">清空</button>
        <button class="btn-show" onclick="showAns()">看答案</button>
        <button onclick="nextQ()">下一题</button>
    </div>
</div>

<div class="admin-panel">
    <details>
        <summary>⚙️ 数据库管理 (导入与清除)</summary>
        <textarea id="jsonInput" placeholder="在此粘贴 AI 生成的 JSON 代码数组..."></textarea>
        <div class="admin-btns">
            <button class="admin-btn btn-cover" onclick="uploadData('cover')">全量覆盖</button>
            <button class="admin-btn btn-merge" onclick="uploadData('merge')">增量合并</button>
        </div>
        <button class="admin-btn btn-delete" style="width: 100%; margin-top: 10px;" onclick="deleteAllData()">清空云端所有题库</button>
    </details>
</div>

<script>
    const SUPABASE_URL = 'https://ltnlmgtoqecvctyeetma.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0bmxtZ3RvcWVjdmN0eWVldG1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjM4MTAsImV4cCI6MjA4OTYzOTgxMH0.OB5An1HAkEiASsE_cV1KoFCWBcyYQGUPa6BKsM6LwaI';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let questions = [];
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // 获取并更新 UI
    async function sync() {
        const { data, error } = await supabase.from('dictation_items').select('*');
        if (!error) {
            questions = data || [];
            document.getElementById('count-info').innerText = `${questions.length} 题`;
            document.getElementById('sync-status').innerText = "✅ 已同步";
            if(questions.length > 0 && document.getElementById('q-text').innerText.includes("数据同步")) nextQ();
            else if(questions.length === 0) document.getElementById('q-text').innerText = "题库空，请导入";
        }
    }

    // 上传数据逻辑
    async function uploadData(mode) {
        const val = document.getElementById('jsonInput').value;
        if(!val) return alert("请先粘贴代码");
        try {
            const json = JSON.parse(val);
            document.getElementById('sync-status').innerText = "⏳ 处理中...";
            
            if (mode === 'cover') {
                await supabase.from('dictation_items').delete().neq('id', '00000000-0000-0000-0000-000000000000');
            }
            
            const { error } = await supabase.from('dictation_items').insert(json);
            if(error) throw error;
            
            alert("操作成功！数据已更新。");
            document.getElementById('jsonInput').value = "";
            await sync(); // 重新拉取并更新计数
        } catch (e) {
            alert("解析或上传失败: " + e.message);
        }
    }

    // 清空数据库
    async function deleteAllData() {
        if(!confirm("确定要永久清空所有题目吗？此操作不可逆。")) return;
        document.getElementById('sync-status').innerText = "⏳ 正在清空...";
        await supabase.from('dictation_items').delete().neq('id', '00000000-0000-0000-0000-000000000000');
        alert("已清空");
        await sync();
    }

    // 练习逻辑
    function nextQ() {
        if (questions.length === 0) return;
        document.getElementById('ans-box').style.display = 'none';
        clearBoard();
        const item = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('q-cat').innerText = item.cat || '言叶';
        document.getElementById('q-text').innerText = item.q || '无题目';
        document.getElementById('ans-text').innerText = item.a || '无答案';
    }

    function showAns() { if(questions.length > 0) document.getElementById('ans-box').style.display = 'block'; }

    // 画布逻辑
    function initCanvas() {
        const rect = canvas.parentNode.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#2c3e50';
    }
    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: cx - rect.left, y: cy - rect.top };
    };
    canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', (e) => { if (drawing) { const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } });
    window.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (drawing) { const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } });
    function clearBoard() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    window.onload = () => { initCanvas(); sync(); };
    window.onresize = initCanvas;
</script>
</body>
</html>
